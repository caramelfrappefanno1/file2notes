<!DOCTYPE html>
<html>
<head>
    <title>AI Quiz Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="side-card">
        <button onclick="toggleHistory()" class="history-toggle">
            ☰ Past Quizzes
        </button>

        <div id="historyPanel" class="history-panel">
            <div class="history-header">
                <h3>Past Quizzes</h3>
                <button onclick="toggleHistory()" class="close-btn">✕</button>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <div class="main-card">
        <h1>AI Quiz Generator</h1>

        <div class="mode-switch">
            <button class="mode-btn active" onclick="setMode('file', this)">Upload File</button>
            <button class="mode-btn" onclick="setMode('link', this)">Use Link</button>
        </div>

        <div id="fileMode">
            <input type="file" id="fileInput">
        </div>

        <div id="linkMode" style="display:none;">
            <input type="text" id="linkInput" placeholder="Paste URL here">
        </div>

        <button class="generate-btn" onclick="generateNotes()">Generate Notes</button>
        <button class="generate-btn" onclick="generateQuiz()">Generate Quiz</button>

        <div id="progressContainer" style="display:none; margin-top:15px;">
            <progress id="uploadProgress" value="0" max="100" style="width:100%;"></progress>
            <p id="progressText" style="text-align:center; font-size:12px;">
                Uploading... 0%
            </p>
        </div>

        <div id="quizContainer"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
